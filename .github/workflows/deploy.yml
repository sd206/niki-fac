name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        default: dev
        type: choice
        options: [dev, test, stage, prod]

env:
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, family-service, calendar-service, tasks-service, notification-service, finance-service, document-service, meal-service, travel-service, ai-service, knowledge-graph-service, analytics-service]
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/niki-${ENVIRONMENT}/${{ matrix.service }}:${GITHUB_SHA}"
          docker build -f services/${{ matrix.service }}/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          SERVICE="niki-${{ matrix.service }}-${ENVIRONMENT}"
          echo "Updating $SERVICE with image $IMAGE..."
          gcloud run services update "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet 2>&1
          echo "Deploy exit code: $?"

      - name: Smoke test
        continue-on-error: true
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          URL=$(gcloud run services describe niki-${{ matrix.service }}-${ENVIRONMENT} --region "$REGION" --format 'value(status.url)')
          echo "Service URL: $URL"
          curl -fsS "$URL/healthz" || echo "WARNING: Smoke test failed (expected for internal services or org-policy restricted projects)"
