services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: niki-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: niki
    ports:
      - "5432:5432"
    volumes:
      - niki_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d niki"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: niki-redis
    ports:
      - "6379:6379"
    volumes:
      - niki_redisdata:/data

volumes:
  niki_pgdata:
  niki_redisdata:
